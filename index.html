<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Nails - Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff0f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d15b8f;
            margin-bottom: 10px;
        }
        .product-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 15px 0;
        }
        .price {
            font-size: 28px;
            font-weight: 800;
            color: #222;
            margin: 10px 0;
        }
        button {
            background: #d15b8f;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:active {
            background: #b04374;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Bella Nails</div>
        <p>Premium Gel Polish (Order ID System)</p>
        <img class="product-img" src="https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&q=80&w=400" alt="Nail Polish">
        <div class="price">₹1.00</div>
        <button id="pay-btn" onclick="startPayment()">Pay Now</button>
        <div id="payment-status" class="status"></div>
    </div>

    <script>
        async function startPayment() {
            const payBtn = document.getElementById('pay-btn');
            const statusText = document.getElementById('payment-status');
            payBtn.disabled = true;
            statusText.innerText = "Creating order securely...";
            statusText.style.color = "#666";

            try {
                const response = await fetch('/api/create-order', { method: 'POST' });
                const order = await response.json();

                if (!order.id) {
                    throw new Error("Failed to initialize server transaction.");
                }

                const options = {
                    key: "rzp_live_T1BHLBSu56cJd3",
                    amount: order.amount,
                    currency: order.currency,
                    name: "Bella Nails",
                    description: "Demo Transaction",
                    image: "https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&q=80&w=200",
                    order_id: order.id,
                    handler: async function (response) {
                        statusText.innerText = "Verifying payment signature...";
                        statusText.style.color = "orange";
                        
                        const verification = await fetch('/api/verify-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature
                            })
                        });

                        const result = await verification.json();
                        if (verification.ok && result.status === 'success') {
                            statusText.innerText = "✅ Payment Successful! Verified via Server.";
                            statusText.style.color = "green";
                        } else {
                            statusText.innerText = "❌ Verification Failed. Suspicious Transaction.";
                            statusText.style.color = "red";
                        }
                        payBtn.disabled = false;
                    },
                    modal: {
                        ondismiss: async function () {
                            statusText.innerText = "❌ Payment Cancelled by User.";
                            statusText.style.color = "red";
                            payBtn.disabled = false;
                            
                            await fetch('/api/verify-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    razorpay_order_id: order.id,
                                    status: 'failed'
                                })
                            });
                        }
                    },
                    prefill: {
                        name: "Demo Customer",
                        email: "customer@gmail.com",
                        contact: "9999999999"
                    },
                    theme: {
                        color: "#d15b8f"
                    }
                };

                const rzp = new Razorpay(options);
                rzp.open();
            } catch (error) {
                statusText.innerText = "❌ Error: " + error.message;
                statusText.style.color = "red";
                payBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
