<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5C1A22">
<title>ISKCON Real Audio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AA%94%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root{
    --maroon:#5C1A22;
    --maroon-dark:#3D0F15;
    --saffron:#E8720C;
    --saffron-light:#FF9A47;
    --gold:#C89B3C;
    --gold-light:#E9C876;
    --teal:#1B6B6B;
    --cream:#FBF3E7;
    --cream-dark:#F1E3CD;
    --ink:#2B1810;
    --ink-soft:#7A6553;
    --white:#FFFFFF;
  }
  *{ margin:0; padding:0; box-sizing:border-box; font-family:'Mukta',Arial,sans-serif; -webkit-tap-highlight-color:transparent; }
  html{ -webkit-text-size-adjust:100%; }
  body{ background:var(--cream); padding-bottom:88px; position:relative; overflow-x:hidden; color:var(--ink); }
  button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  /* ===== Header ===== */
  .header{ background:linear-gradient(120deg,var(--maroon) 0%,var(--maroon-dark) 100%); padding:14px 12px; position:sticky; top:0; z-index:100; display:flex; gap:8px; align-items:center; box-shadow:0 3px 14px rgba(0,0,0,.25); border-bottom:2px solid var(--gold); }
  .icon-btn{ background:rgba(255,255,255,.12); border:none; color:var(--white); width:42px; height:42px; min-width:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .icon-btn:active{ background:rgba(255,255,255,.25); }
  .header input{ flex:1; padding:10px 16px; border:none; border-radius:22px; outline:none; font-size:15px; font-weight:600; background:var(--white); color:var(--ink); min-width:0; }
  .search-btn{ padding:10px 16px; background:var(--gold); color:var(--maroon-dark); border:none; border-radius:22px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .search-btn:disabled{ opacity:.6; }

  /* ===== Quick chips ===== */
  .chips{ display:flex; gap:8px; padding:12px 12px 4px; overflow-x:auto; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:none; padding:8px 16px; border-radius:18px; border:1.5px solid var(--maroon); background:var(--white); color:var(--maroon); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .chip.active{ background:var(--maroon); color:var(--white); }

  #status{ text-align:center; margin:18px 0; font-weight:600; color:var(--ink-soft); font-size:14px; }

  /* ===== Feed ===== */
  .feed{ padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:14px; }
  .card{ background:var(--white); border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(92,26,34,.1); cursor:pointer; transition:transform .12s ease; border:2px solid transparent; }
  .card:active{ transform:scale(.97); }
  .card.playing{ border-color:var(--saffron); }
  .card .thumb-wrap{ position:relative; }
  .card img{ width:100%; height:120px; object-fit:cover; display:block; background:var(--cream-dark); }
  .card .thumb-wrap .play-badge{ position:absolute; bottom:6px; right:6px; width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,.55); color:var(--white); display:flex; align-items:center; justify-content:center; }
  .card .thumb-wrap .play-badge .material-icons{ font-size:16px; }
  .card .info{ padding:10px; }
  .card .title{ font-size:13.5px; font-weight:700; color:var(--ink); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.3; }
  .card .channel{ font-size:11.5px; color:var(--ink-soft); margin-top:5px; font-weight:500; }

  /* ===== Skeleton loading ===== */
  .skeleton .thumb{ height:120px; background:linear-gradient(90deg,var(--cream-dark) 25%,#e6d5b8 37%,var(--cream-dark) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; }
  .skeleton .line{ height:10px; border-radius:5px; margin:10px; background:linear-gradient(90deg,var(--cream-dark) 25%,#e6d5b8 37%,var(--cream-dark) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; }
  .skeleton .line.short{ width:60%; }
  @keyframes shimmer{ 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }

  .empty-state, .error-state{ text-align:center; padding:50px 24px; color:var(--ink-soft); }
  .empty-state .material-icons, .error-state .material-icons{ font-size:52px; color:var(--gold); margin-bottom:10px; }

  /* ===== Toast ===== */
  .toast{ position:fixed; left:50%; bottom:100px; transform:translate(-50%,20px); background:var(--ink); color:var(--white); padding:10px 18px; border-radius:22px; font-size:13.5px; font-weight:600; z-index:120; opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; display:flex; align-items:center; gap:8px; max-width:88%; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .toast .material-icons{ font-size:18px; color:var(--saffron-light); }

  /* ===== Mini player ===== */
  .player{ position:fixed; bottom:0; left:0; width:100%; background:linear-gradient(120deg,var(--maroon-dark),var(--maroon)); color:var(--white); padding:12px 14px; display:flex; align-items:center; gap:10px; z-index:100; border-top:2px solid var(--gold); cursor:pointer; }
  .mini-progress{ position:absolute; top:0; left:0; width:100%; height:3px; background:rgba(255,255,255,.15); }
  .mini-progress-fill{ height:100%; width:0%; background:var(--gold-light); }
  .mini-art{ width:42px; height:42px; border-radius:8px; object-fit:cover; background:var(--cream-dark); flex:none; }
  .player-info{ flex:1; min-width:0; }
  .song-title{ font-size:13.5px; font-weight:700; color:var(--gold-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-channel{ font-size:11px; color:rgba(255,255,255,.65); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .controls{ display:flex; align-items:center; gap:2px; flex:none; }
  .ctrl-btn{ background:none; border:none; color:var(--white); cursor:pointer; display:flex; align-items:center; padding:4px; }
  .ctrl-btn:disabled{ opacity:.35; }
  .ctrl-btn .material-icons{ font-size:26px; }

  /* ===== Expanded Now Playing sheet ===== */
  .sheet{ position:fixed; left:0; bottom:0; width:100%; height:82vh; background:linear-gradient(180deg,var(--maroon) 0%,var(--maroon-dark) 100%); z-index:150; border-radius:24px 24px 0 0; transform:translateY(102%); transition:transform .35s cubic-bezier(.32,.72,0,1); padding:10px 26px 26px; display:flex; flex-direction:column; align-items:center; box-shadow:0 -8px 30px rgba(0,0,0,.4); }
  .sheet.open{ transform:translateY(0); }
  .sheet-handle{ width:40px; height:4px; background:rgba(255,255,255,.3); border-radius:3px; margin:8px 0 4px; }
  .sheet-close{ position:absolute; top:14px; right:16px; background:rgba(255,255,255,.12); border:none; color:var(--white); width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .sheet-art-wrap{ width:min(72vw,280px); height:min(72vw,280px); border-radius:18px; overflow:hidden; margin:22px 0 26px; box-shadow:0 14px 34px rgba(0,0,0,.4); flex:none; }
  .sheet-art{ width:100%; height:100%; object-fit:cover; background:var(--cream-dark); }
  .sheet-title{ font-size:18px; font-weight:700; color:var(--white); text-align:center; padding:0 8px; }
  .sheet-channel{ font-size:13.5px; color:var(--gold-light); margin-top:6px; text-align:center; }
  .now-playing-flag{ display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,.55); margin-top:14px; letter-spacing:.5px; text-transform:uppercase; }
  .now-playing-flag .flame{ font-size:14px; }
  @media (prefers-reduced-motion: no-preference){
    .flame.spin{ animation:flicker 1.1s ease-in-out infinite; }
  }
  @keyframes flicker{ 0%,100%{ transform:scale(1) rotate(-2deg); opacity:1;} 50%{ transform:scale(1.15) rotate(3deg); opacity:.85;} }

  .seek-row{ width:100%; display:flex; align-items:center; gap:10px; margin-top:20px; }
  .seek-row .time{ font-size:11.5px; color:rgba(255,255,255,.7); font-variant-numeric:tabular-nums; width:36px; flex:none; }
  .seek-row .time:last-child{ text-align:right; }
  input[type="range"]{ -webkit-appearance:none; appearance:none; flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,.25); outline:none; }
  input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; width:15px; height:15px; border-radius:50% 50% 50% 0; transform:rotate(45deg); background:var(--gold); box-shadow:0 0 0 3px rgba(200,155,60,.25); cursor:pointer; }
  input[type="range"]::-moz-range-thumb{ width:15px; height:15px; border:none; border-radius:50% 50% 50% 0; transform:rotate(45deg); background:var(--gold); cursor:pointer; }

  .sheet-controls{ display:flex; align-items:center; justify-content:center; gap:26px; margin-top:24px; }
  .ctrl-btn.big .material-icons{ font-size:38px; }
  .ctrl-btn.play-btn.big .material-icons{ font-size:70px; }

  /* ===== Drawer ===== */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:190; opacity:0; pointer-events:none; transition:opacity .25s ease; }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{ position:fixed; top:0; left:0; height:100%; width:78vw; max-width:300px; background:var(--white); z-index:200; transform:translateX(-102%); transition:transform .3s cubic-bezier(.32,.72,0,1); display:flex; flex-direction:column; box-shadow:4px 0 24px rgba(0,0,0,.25); }
  .drawer.open{ transform:translateX(0); }
  .drawer-head{ background:linear-gradient(120deg,var(--maroon),var(--maroon-dark)); color:var(--white); padding:34px 20px 20px; }
  .drawer-flame{ font-size:30px; }
  .drawer-title{ font-family:'Yatra One',cursive; font-size:20px; margin-top:8px; color:var(--gold-light); }
  .drawer-sub{ font-size:12px; color:rgba(255,255,255,.7); margin-top:2px; }
  .drawer-link{ display:flex; align-items:center; gap:14px; padding:15px 20px; color:var(--ink); text-decoration:none; font-size:14.5px; font-weight:600; border:none; background:none; width:100%; text-align:left; cursor:pointer; }
  .drawer-link .material-icons{ color:var(--saffron); font-size:21px; }
  .drawer-link.active{ background:var(--cream); color:var(--maroon); }
  .drawer-link:active{ background:var(--cream); }
  .drawer-foot{ margin-top:auto; padding:18px 20px; font-size:11.5px; color:var(--ink-soft); border-top:1px solid var(--cream-dark); }

  /* ===== Hidden official YouTube player ===== */
  .yt-hidden-wrapper{ position:absolute; top:0; left:0; width:100%; height:200px; z-index:-10; opacity:.01; pointer-events:none; }
</style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>

  <nav class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div class="drawer-flame">🪔</div>
      <div class="drawer-title">ISKCON Real Audio</div>
      <div class="drawer-sub">Hare Krishna Kirtan &amp; Bhajans</div>
    </div>
    <a class="drawer-link active" href="index.html"><span class="material-icons">home</span>Home</a>
    <a class="drawer-link" href="about.html"><span class="material-icons">info</span>About Us</a>
    <a class="drawer-link" href="privacy.html"><span class="material-icons">privacy_tip</span>Privacy Policy</a>
    <a class="drawer-link" href="terms.html"><span class="material-icons">gavel</span>Terms &amp; Conditions</a>
    <a class="drawer-link" href="contact.html"><span class="material-icons">mail</span>Contact Us</a>
    <button class="drawer-link" onclick="shareApp()"><span class="material-icons">share</span>Share App</button>
    <div class="drawer-foot">Developed with 🙏 by Dev Santosh</div>
  </nav>

  <header class="header">
    <button class="icon-btn" onclick="openDrawer()" aria-label="Menu"><span class="material-icons">menu</span></button>
    <input type="text" id="searchInput" value="ISKCON Kirtan">
    <button class="search-btn" id="searchBtn" onclick="searchYouTube()">Search</button>
  </header>

  <div class="chips" id="chips">
    <button class="chip" onclick="selectChip(this,'ISKCON Kirtan')">Kirtan</button>
    <button class="chip" onclick="selectChip(this,'ISKCON Bhajan')">Bhajan</button>
    <button class="chip" onclick="selectChip(this,'Mangal Aarti ISKCON')">Mangal Aarti</button>
    <button class="chip" onclick="selectChip(this,'Bhagavad Gita class')">Gita Class</button>
    <button class="chip" onclick="selectChip(this,'Hare Krishna Maha Mantra')">Maha Mantra</button>
  </div>

  <div id="status">Ready to load...</div>

  <div class="feed" id="videoFeed"></div>

  <div class="toast" id="toast"><span class="material-icons">play_circle</span><span id="toastText"></span></div>

  <!-- Mini Player -->
  <div class="player" id="miniPlayer" onclick="expandPlayer()">
    <div class="mini-progress"><div class="mini-progress-fill" id="miniProgressFill"></div></div>
    <img class="mini-art" id="miniArt" alt="">
    <div class="player-info">
      <div class="song-title" id="nowPlaying">Select a Kirtan to Play</div>
      <div class="song-channel" id="nowPlayingChannel"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" onclick="event.stopPropagation();prevTrack()" disabled><span class="material-icons">skip_previous</span></button>
      <button class="ctrl-btn" id="playBtn" onclick="event.stopPropagation();togglePlay()"><span class="material-icons" style="font-size:44px;">play_circle</span></button>
      <button class="ctrl-btn" id="nextBtn" onclick="event.stopPropagation();nextTrack()" disabled><span class="material-icons">skip_next</span></button>
    </div>
  </div>

  <!-- Expanded Now Playing sheet -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="collapsePlayer()" aria-label="Minimize"><span class="material-icons">keyboard_arrow_down</span></button>
    <div class="sheet-art-wrap"><img class="sheet-art" id="sheetArt" alt=""></div>
    <div class="sheet-title" id="sheetTitle">Select a Kirtan to Play</div>
    <div class="sheet-channel" id="sheetChannel"></div>
    <div class="now-playing-flag"><span class="flame" id="sheetFlame">🪔</span><span id="sheetStateText">Paused</span></div>
    <div class="seek-row">
      <span class="time" id="currentTime">0:00</span>
      <input type="range" id="seekBar" min="0" max="100" value="0">
      <span class="time" id="durationTime">0:00</span>
    </div>
    <div class="sheet-controls">
      <button class="ctrl-btn big" id="prevBtn2" onclick="prevTrack()" disabled><span class="material-icons">skip_previous</span></button>
      <button class="ctrl-btn play-btn big" id="playBtn2" onclick="togglePlay()"><span class="material-icons" style="font-size:70px;">play_circle</span></button>
      <button class="ctrl-btn big" id="nextBtn2" onclick="nextTrack()" disabled><span class="material-icons">skip_next</span></button>
    </div>
  </div>

  <!-- The Hidden Official Player -->
  <div class="yt-hidden-wrapper">
    <div id="ytplayer"></div>
  </div>

  <!-- YouTube API Script -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    /*
      ⚠️ ABOUT BACKGROUND / LOCK-SCREEN PLAYBACK ⚠️
      This player deliberately does NOT wire up an Android notification /
      MediaSession so audio keeps playing when the screen locks or the app
      is minimized. YouTube's API Services Developer Policies explicitly
      prohibit (a) allowing background play of the YouTube player and
      (b) separating/isolating the audio track from YouTube video content.
      Doing both together, then shipping it at scale, is the fastest way to
      get this API key revoked and the app pulled.

      The compliant way to get real lock-screen play/pause/seek/next is to
      switch the audio source to files you own or are licensed to use
      (your own recorded/licensed kirtan mp3s, hosted anywhere you like)
      and drive THOSE through the MediaSession API + a foreground Service
      in Sketchware. All the queue/seek/UI logic below carries over almost
      unchanged for that version — ask for it once you have real audio files.
    */

    // 👉 यहाँ अपनी API Key डालो (Inverted Commas के अंदर) 👈
    // ⚠️ SECURITY: this key is visible to anyone who unzips the APK.
    // Restrict it in Google Cloud Console to YouTube Data API v3 only,
    // and to this app's package name + SHA-1 fingerprint. For real scale,
    // route search through your own backend instead (see chat reply).
    const API_KEY = "AIzaSyCLqdVPGru5yJQUtNwV5OIcbDRPAJqVWtY";
    const PLAY_STORE_PACKAGE = "com.devsantosh.iskconrealaudio"; // TODO: replace with your real published package name

    let ytPlayer;
    let isPlayerReady = false;
    let isPlaying = false;
    let currentResults = [];
    let currentIndex = -1;
    let isSeeking = false;
    let progressTimer = null;
    let isSearching = false;
    let toastTimer = null;

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('ytplayer', {
        height: '200',
        width: '100%',
        videoId: '',
        playerVars: { 'playsinline': 1, 'controls': 0, 'autoplay': 1 },
        events: { 'onReady': () => { isPlayerReady = true; }, 'onStateChange': onPlayerStateChange }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data == YT.PlayerState.PLAYING) {
        isPlaying = true;
        startProgressTimer();
      } else if (event.data == YT.PlayerState.ENDED) {
        isPlaying = false;
        stopProgressTimer();
        if (currentIndex < currentResults.length - 1) { nextTrack(); }
      } else {
        isPlaying = false;
        stopProgressTimer();
      }
      updatePlayIcons();
    }

    function updatePlayIcons() {
      const icon = isPlaying ? 'pause_circle' : 'play_circle';
      document.querySelector('#playBtn .material-icons').innerText = icon;
      document.querySelector('#playBtn2 .material-icons').innerText = icon;
      document.getElementById('sheetStateText').innerText = isPlaying ? 'Playing' : 'Paused';
      document.getElementById('sheetFlame').classList.toggle('spin', isPlaying);
    }

    function togglePlay() {
      if (!ytPlayer || !isPlayerReady) return;
      if (isPlaying) ytPlayer.pauseVideo();
      else ytPlayer.playVideo();
    }

    function setPrevNextDisabled() {
      document.getElementById('prevBtn').disabled = currentIndex <= 0;
      document.getElementById('prevBtn2').disabled = currentIndex <= 0;
      document.getElementById('nextBtn').disabled = currentIndex >= currentResults.length - 1;
      document.getElementById('nextBtn2').disabled = currentIndex >= currentResults.length - 1;
    }

    function playAt(index) {
      if (index < 0 || index >= currentResults.length) return;
      currentIndex = index;
      const item = currentResults[index];
      if (ytPlayer && ytPlayer.loadVideoById) {
        ytPlayer.loadVideoById(item.videoId);
      }
      updateNowPlayingUI(item);
      setPrevNextDisabled();
      highlightPlayingCard();
      showToast(item.title);
    }

    function nextTrack() { if (currentIndex < currentResults.length - 1) playAt(currentIndex + 1); }
    function prevTrack() { if (currentIndex > 0) playAt(currentIndex - 1); }

    function updateNowPlayingUI(item) {
      document.getElementById('nowPlaying').innerText = item.title;
      document.getElementById('nowPlayingChannel').innerText = item.channel;
      document.getElementById('miniArt').src = item.thumb;
      document.getElementById('sheetTitle').innerText = item.title;
      document.getElementById('sheetChannel').innerText = item.channel;
      document.getElementById('sheetArt').src = item.thumb;
    }

    function highlightPlayingCard() {
      document.querySelectorAll('.card').forEach((c, i) => c.classList.toggle('playing', i === currentIndex));
    }

    function formatTime(sec) {
      if (!isFinite(sec) || sec < 0) sec = 0;
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function startProgressTimer() {
      stopProgressTimer();
      progressTimer = setInterval(() => {
        if (!ytPlayer || isSeeking) return;
        const dur = ytPlayer.getDuration ? ytPlayer.getDuration() : 0;
        const cur = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
        if (dur > 0) {
          document.getElementById('seekBar').max = dur;
          document.getElementById('seekBar').value = cur;
          document.getElementById('durationTime').innerText = formatTime(dur);
          document.getElementById('miniProgressFill').style.width = ((cur / dur) * 100) + '%';
        }
        document.getElementById('currentTime').innerText = formatTime(cur);
      }, 500);
    }
    function stopProgressTimer() { if (progressTimer) { clearInterval(progressTimer); progressTimer = null; } }

    document.getElementById('seekBar').addEventListener('input', (e) => {
      isSeeking = true;
      document.getElementById('currentTime').innerText = formatTime(Number(e.target.value));
    });
    document.getElementById('seekBar').addEventListener('change', (e) => {
      if (ytPlayer && ytPlayer.seekTo) ytPlayer.seekTo(Number(e.target.value), true);
      isSeeking = false;
    });

    function showToast(title) {
      clearTimeout(toastTimer);
      const toast = document.getElementById('toast');
      document.getElementById('toastText').innerText = 'Playing: ' + title;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    function expandPlayer() { if (currentIndex === -1) return; document.getElementById('sheet').classList.add('open'); }
    function collapsePlayer() { document.getElementById('sheet').classList.remove('open'); }

    function selectChip(el, text) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('searchInput').value = text;
      searchYouTube();
    }

    async function shareApp() {
      const shareData = {
        title: 'ISKCON Real Audio',
        text: 'Hare Krishna! ISKCON Real Audio App - Kirtan aur Bhajans suno, anywhere anytime. 🙏',
        url: `https://play.google.com/store/apps/details?id=${PLAY_STORE_PACKAGE}`
      };
      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else {
          await navigator.clipboard.writeText(shareData.url);
          showShareFallback();
        }
      } catch (err) { /* user cancelled share sheet, ignore */ }
    }
    function showShareFallback() {
      clearTimeout(toastTimer);
      const toast = document.getElementById('toast');
      document.getElementById('toastText').innerText = 'Link copied! Share karo apne dosto ke saath 🙏';
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function renderSkeletons(count) {
      const feed = document.getElementById('videoFeed');
      feed.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'card skeleton';
        s.innerHTML = `<div class="thumb"></div><div class="line"></div><div class="line short"></div>`;
        feed.appendChild(s);
      }
    }

    function renderResults() {
      const feed = document.getElementById('videoFeed');
      feed.innerHTML = '';
      if (currentResults.length === 0) {
        feed.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><span class="material-icons">search_off</span><div>Kuch nahi mila, dusra keyword try karo</div></div>`;
        return;
      }
      currentResults.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card' + (i === currentIndex ? ' playing' : '');
        card.onclick = () => playAt(i);
        card.innerHTML = `
          <div class="thumb-wrap">
            <img src="${item.thumb}" alt="Thumbnail" loading="lazy">
            <div class="play-badge"><span class="material-icons">play_arrow</span></div>
          </div>
          <div class="info">
            <div class="title">${item.title}</div>
            <div class="channel">${item.channel}</div>
          </div>`;
        feed.appendChild(card);
      });
    }

    async function searchYouTube() {
      if (isSearching) return;
      if (API_KEY === "YOUR_API_KEY_HERE") {
        document.getElementById('status').innerHTML = "<span style='color:#B00020;'>Bhai! Phele API Key dalo code mein.</span>";
        return;
      }

      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      const status = document.getElementById('status');
      const searchBtn = document.getElementById('searchBtn');

      isSearching = true;
      searchBtn.disabled = true;
      status.style.display = 'block';
      status.innerText = 'Searching from Official YouTube...';
      renderSkeletons(6);

      try {
        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`);
        const data = await response.json();

        if (data.error) {
          const reason = data.error.errors && data.error.errors[0] ? data.error.errors[0].reason : '';
          if (reason === 'quotaExceeded') {
            status.innerHTML = "<span style='color:#B00020;'>Aaj ka search limit khatam ho gaya, kal try karo 🙏</span>";
          } else {
            status.innerHTML = "<span style='color:#B00020;'>Search Error! API Key check karo.</span>";
          }
          currentResults = [];
          renderResults();
          return;
        }

        if (data.items && data.items.length > 0) {
          status.style.display = 'none';
          currentResults = data.items
            .filter(item => item.id && item.id.videoId)
            .map(item => ({
              videoId: item.id.videoId,
              title: item.snippet.title,
              channel: item.snippet.channelTitle,
              thumb: item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.default.url
            }));
          currentIndex = -1;
          renderResults();
        } else {
          status.innerText = 'No results found.';
          currentResults = [];
          renderResults();
        }
      } catch (error) {
        status.innerText = 'Search Error! Connection check karo.';
        currentResults = [];
        renderResults();
      } finally {
        isSearching = false;
        searchBtn.disabled = false;
      }
    }

    // App khulte hi pehla search karega
    window.onload = () => {
      setTimeout(searchYouTube, 1500);
    };
  </script>
</body>
</html>
